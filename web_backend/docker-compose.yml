services:
  web-backend:
    image: protires-backend:latest
    container_name: protires-backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PROJECT_ROOT: /app/web_backend
    volumes:
      - ./runtime/Users:/app/web_backend/Users
      - ./runtime/AtWork:/app/web_backend/AtWork
      - ./runtime/log_upload:/app/web_backend/log_upload
    ports:
      - "${BACKEND_PORT:-18080}:18080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
